## Namespace
namespace: hive
createNamespace: false

## Image
image:
  repository: wgqcd/hive-metastore
  tag: "3.1.3-20260407"
  pullPolicy: IfNotPresent

## Replica count
replicaCount: 2

## Rolling update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1

## Node selector
nodeSelector:
  hive: "support"

## Resources
resources:
  requests:
    memory: "8Gi"
    cpu: "2"
  # limits: {}

## JVM settings
jvm:
  maxHeap: "6g"

## JMX Prometheus exporter (single toggle; paths/port defined in templates)
jmxPrometheus:
  enabled: true

## Service
service:
  type: LoadBalancer
  port: 9083
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"

## Probes
livenessProbe:
  tcpSocket:
    port: 9083
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  tcpSocket:
    port: 9083
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

## ---- Azure identity (used in hive-site.xml) ----
database:
  driverName: "com.mysql.cj.jdbc.Driver"
  url: "jdbc:mysql://wgq-mysql8-eastus2.mysql.database.azure.com:3306/hive_metastore_jw?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&rewriteBatchedStatements=true&connectTimeout=10000&socketTimeout=60000"
  username: "azureuser"
  password: "P@ssword123!"

## ---- Azure identity (used in hive-site.xml) ----
azure:
  clientId: "8a0f27e6-9100-48b0-bbc1-75a9f063bf48"
  tenantId: "16b3c013-d300-468d-ac64-7eda0820b6d3"
  hnsEnabled: "true"
  fnsServiceType: "DFS"

## ---- Hive Metastore tuning ----
metastore:
  server:
    maxThreads: "300"
    minThreads: "50"
  connectionPool:
    maxPoolSize: "30"

## ---- Hive-site.xml extra fixed properties ----
## Override or append additional <property> blocks in hive-site.xml.
## Each entry becomes a <property><name>key</name><value>val</value></property>.
hiveSiteExtra: {}
