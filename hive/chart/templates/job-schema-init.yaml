{{- if .Values.schemaInit.enabled }}
{{- $useHook := eq (include "hive-metastore.schemaInit.useHook" .) "true" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hive-metastore.fullname" . }}-schema-init-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hive-metastore.labels" . | nindent 4 }}
  {{- if $useHook }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
  {{- end }}
data:
  hive-site.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration>
        <property>
            <name>javax.jdo.option.ConnectionDriverName</name>
            <value>{{ include "hive-metastore.database.driverName" . }}</value>
        </property>
        <property>
            <name>javax.jdo.option.ConnectionURL</name>
            <value>{{ include "hive-metastore.database.url" . | replace "&" "&amp;" }}</value>
        </property>
        <property>
            <name>javax.jdo.option.ConnectionUserName</name>
            <value>{{ include "hive-metastore.database.username" . }}</value>
        </property>
        <property>
            <name>javax.jdo.option.ConnectionPassword</name>
            <value>{{ include "hive-metastore.database.password" . }}</value>
        </property>
        <property>
            <name>metastore.metastore.event.db.notification.api.auth</name>
            <value>false</value>
        </property>
    </configuration>
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hive-metastore.fullname" . }}-schema-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hive-metastore.labels" . | nindent 4 }}
  {{- if $useHook }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
  {{- end }}
spec:
  backoffLimit: {{ .Values.schemaInit.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.schemaInit.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "hive-metastore.selectorLabels" . | nindent 8 }}
        job: schema-init
        {{- if .Values.azure.workloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      restartPolicy: OnFailure
      {{- if .Values.azure.workloadIdentity.enabled }}
      serviceAccountName: {{ include "hive-metastore.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: schema-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export HIVE_CONF_DIR=$HIVE_HOME/conf
              DB_TYPE="{{ include "hive-metastore.schemaInit.dbType" . }}"
              {{- $host := include "hive-metastore.database.embedded.host" . -}}
              {{- $port := include "hive-metastore.database.embedded.port" . }}
              {{- if $host }}
              DB_HOST="{{ $host }}"
              DB_PORT="{{ $port }}"
              echo "Waiting for embedded DB ${DB_HOST}:${DB_PORT} to accept connections..."
              for i in $(seq 1 60); do
                if timeout 2 bash -c ">/dev/tcp/${DB_HOST}/${DB_PORT}" 2>/dev/null; then
                  echo "DB is up after ${i}s."
                  break
                fi
                sleep 2
                if [ "$i" -eq 60 ]; then
                  echo "Timed out waiting for DB." >&2
                  exit 1
                fi
              done
              {{- end }}
              echo "Checking Hive Metastore schema (dbType=${DB_TYPE})..."
              if $HIVE_HOME/bin/schematool -dbType ${DB_TYPE} -info >/dev/null 2>&1; then
                echo "Schema already initialized. Skipping initSchema."
                {{- if .Values.schemaInit.upgradeSchema }}
                echo "Running schema upgrade..."
                $HIVE_HOME/bin/schematool -dbType ${DB_TYPE} -upgradeSchema
                {{- end }}
              else
                echo "Schema not found. Running initSchema..."
                $HIVE_HOME/bin/schematool -dbType ${DB_TYPE} -initSchema -verbose
              fi
          volumeMounts:
            - name: hive-config
              mountPath: /opt/hive/conf/hive-site.xml
              subPath: hive-site.xml
              readOnly: true
          {{- with .Values.schemaInit.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: hive-config
          configMap:
            name: {{ include "hive-metastore.fullname" . }}-schema-init-config
{{- end }}
