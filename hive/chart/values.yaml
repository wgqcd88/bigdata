## Namespace
namespace: hive
createNamespace: false

## Image
image:
  repository: wgqcd/hive-metastore
  tag: "3.1.3-20260407"
  pullPolicy: IfNotPresent
  ## Image pull secrets (reference existing secrets in the namespace)
  ## Example:
  ##   pullSecrets:
  ##     - name: my-registry-secret
  pullSecrets: []

## Replica count
replicaCount: 2

## Rolling update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

## Node selector
nodeSelector: {}

## Tolerations
## Example:
##   tolerations:
##     - key: "dedicated"
##       operator: "Equal"
##       value: "hive"
##       effect: "NoSchedule"
tolerations: []

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app: hive-metastore
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: hive-metastore
          topologyKey: topology.kubernetes.io/zone
## Resources
resources:
  requests:
    memory: "8Gi"
    cpu: "2"
  # limits: {}

## JVM settings
jvm:
  maxHeap: "6g"

## JMX Prometheus exporter (single toggle; paths/port defined in templates)
jmxPrometheus:
  enabled: true

## Service
service:
  type: LoadBalancer
  port: 9083
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"

## Probes
livenessProbe:
  tcpSocket:
    port: 9083
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  tcpSocket:
    port: 9083
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

## ---- Azure identity (used in hive-site.xml) ----
database:
  driverName: "com.mysql.cj.jdbc.Driver"
  url: "<JDBC_CONNECTION_URL>"
  username: "<DB_USERNAME>"
  password: "<DB_PASSWORD>"

## ---- Azure identity (used in hive-site.xml) ----
azure:
  clientId: "<AZURE_CLIENT_ID>"
  tenantId: "<AZURE_TENANT_ID>"
  hnsEnabled: "true"


## ---- Schema initialization Job (runs schematool against the metastore DB) ----
schemaInit:
  enabled: true
  dbType: "mysql"
  upgradeSchema: false
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"

## ---- Hive Metastore tuning ----
metastore:
  server:
    maxThreads: "300"
    minThreads: "50"
  connectionPool:
    maxPoolSize: "30"

## ---- Hive-site.xml extra fixed properties ----
## Override or append additional <property> blocks in hive-site.xml.
## Each entry becomes a <property><name>key</name><value>val</value></property>.
hiveSiteExtra: {}
