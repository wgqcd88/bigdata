
createNamespace: false

## Image
image:
  repository: ghcr.io/wgqcd88/hive-metastore
  tag: "3.1.3-20260705"
  pullPolicy: IfNotPresent
  ## Image pull secrets (reference existing secrets in the namespace)
  ## Example:
  ##   pullSecrets:
  ##     - name: my-registry-secret
  pullSecrets: []

## Replica count
replicaCount: 2

## Rolling update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

## Node selector
nodeSelector: {}

## Tolerations
## Example:
##   tolerations:
##     - key: "dedicated"
##       operator: "Equal"
##       value: "hive"
##       effect: "NoSchedule"
tolerations: []

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app: hive-metastore
            component: hive-metastore
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: hive-metastore
              component: hive-metastore
          topologyKey: topology.kubernetes.io/zone
## Resources
resources:
  requests:
    memory: "8Gi"
    cpu: "2"
  # limits: {}

## JVM settings
jvm:
  maxHeap: "6g"

## JMX Prometheus exporter (single toggle; paths/port defined in templates)
jmxPrometheus:
  enabled: true

## Service
service:
  type: LoadBalancer
  port: 9083
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"

## Probes
livenessProbe:
  tcpSocket:
    port: 9083
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  tcpSocket:
    port: 9083
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

## ---- Azure identity (used in hive-site.xml) ----
## External database. Used when .Values.mysql.enabled is false; ignored otherwise
## (the chart derives url/username/password from the embedded MySQL below).
database:
  driverName: "com.mysql.cj.jdbc.Driver"
  url: "<JDBC_CONNECTION_URL>"
  username: "<DB_USERNAME>"
  password: "<DB_PASSWORD>"

## ---- Embedded MySQL (single-replica, cluster-internal) ----
## For dev / POC / small deployments. For production, use an external managed DB
## and keep mysql.enabled=false.
## When enabled=true, the chart:
##   * renders a MySQL Deployment + Service + Secret (and optional PVC)
##   * overrides database.driverName/url/username/password with values pointing at it
## mysql.enabled and postgresql.enabled are mutually exclusive.
mysql:
  enabled: false
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  ## Root password is required by the mysql image at first boot.
  rootPassword: "hive-root"
  ## Application user/db created automatically by the mysql image on first boot.
  database: "metastore"
  user: "hive"
  password: "hive"
  service:
    port: 3306
  ## Extra query args appended to the JDBC URL
  jdbcParams: "useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true"
  persistence:
    enabled: true
    size: "20Gi"
    ## Leave empty to use the cluster default StorageClass
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
  nodeSelector: {}
  tolerations: []

## ---- Embedded PostgreSQL (single-replica, cluster-internal) ----
## Same purpose as the embedded MySQL block above; use for dev / POC only.
## When enabled=true, the chart:
##   * renders a PostgreSQL Deployment + Service + Secret (and optional PVC)
##   * overrides database.driverName/url/username/password with values pointing at it
##   * forces schemaInit.dbType to "postgres"
## mysql.enabled and postgresql.enabled are mutually exclusive.
postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  ## Application user/db created automatically on first boot.
  database: "metastore"
  user: "hive"
  password: "hive"
  service:
    port: 5432
  ## Extra query args appended to the JDBC URL (e.g. sslmode=disable)
  jdbcParams: ""
  ## Force md5 host auth. The hive-metastore image bundles an older PostgreSQL
  ## JDBC driver that does not implement SCRAM (auth type 10 — postgres 14+
  ## default). These two values are only honored during the first initdb; wipe
  ## the PVC before changing them on an existing cluster.
  hostAuthMethod: "md5"
  initdbArgs: "--auth-host=md5"
  persistence:
    enabled: true
    size: "20Gi"
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
  nodeSelector: {}
  tolerations: []

## ---- Azure identity (used in hive-site.xml) ----
azure:
  clientId: "<AZURE_CLIENT_ID>"
  tenantId: "<AZURE_TENANT_ID>"
  hnsEnabled: "true"
  ## Azure AD Workload Identity (AKS)
  ## When enabled=true, fs.azure.account.auth.type is switched to OAuth and
  ## the WorkloadIdentityTokenProvider from hadoop-azure is used instead of
  ## the IMDS-based MSI provider. Requires the workload-identity mutating
  ## webhook to be installed in the cluster (default in AKS >=1.24 with the
  ## workload identity add-on enabled).
  workloadIdentity:
    enabled: false
    serviceAccount:
      ## When create=true, chart renders a ServiceAccount annotated for WI.
      ## When create=false, an externally-managed SA is referenced by name.
      create: true
      ## SA name. Defaults to the chart fullname when empty.
      name: ""
      ## Extra annotations merged into the SA (azure.workload.identity/client-id
      ## is added automatically from azure.clientId).
      annotations: {}


## ---- Schema initialization Job (runs schematool against the metastore DB) ----
schemaInit:
  enabled: true
  dbType: "mysql"
  upgradeSchema: false
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"

## ---- Hive Metastore tuning ----
metastore:
  server:
    maxThreads: "300"
    minThreads: "50"
  connectionPool:
    maxPoolSize: "30"
  metrics:
    enabled: true
    reporter: "JMX"

## ---- Hive-site.xml extra fixed properties ----
## Override or append additional <property> blocks in hive-site.xml.
## Each entry becomes a <property><name>key</name><value>val</value></property>.
hiveSiteExtra: {}
