{{- if .Values.thriftServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: spark-thrift-driver
  namespace: {{ include "spark.namespace" . }}
  labels:
    {{- include "spark.thrift.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "spark.thrift.selectorLabels" . | nindent 4 }}
  ports:
    - name: driver-rpc
      protocol: TCP
      port: {{ .Values.thriftServer.ports.driverRpc }}
      targetPort: {{ .Values.thriftServer.ports.driverRpc }}
    - name: block-manager
      protocol: TCP
      port: {{ .Values.thriftServer.ports.blockManager }}
      targetPort: {{ .Values.thriftServer.ports.blockManager }}
{{- end }}
